<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Your name">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="MonoMuse website redesign project">
    <title>MonoMuse - Checkouts</title>   
    <link rel="stylesheet" href="../static/style.css"> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="../static/script.js" defer></script>
</head>
<body onload="addYear()">
    <div class="container">

        <header class="header"> 
            <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
            <h1>Checkout</h1>
        </header>

        <nav class="nav_bar">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a class="cta" href="tickets.html">Buy Tickets</a>
            <a href="checkout.html">Checkout</a>
            <button id="hamburger" onclick="toggleNav()">☰</button>
        </nav>

        <main class="main">
            <form>
                <label>Name: (required)</label><br>
                <input type="text" name="name" required><br><br>

                <label>Email: (required)</label><br>
                <input type="email" name="email" required><br><br>

                <label>Ticket Quantity: (required)</label><br>
                <input type="number" name="quantity" required><br><br>

                <button type="submit">Submit</button>
            </form>
        </main>

        <footer class="footer">© <p id="copyYear"></p> MonoMuse. All rights reserved.</footer>

    </div>
</body>
</html>
